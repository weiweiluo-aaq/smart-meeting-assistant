<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史会议管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="optimized-styles.css">
    <style>
        .meeting-card {
            transition: all 0.3s ease;
        }
        .meeting-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .priority-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .priority-high { background: #fee2e2; color: #dc2626; }
        .priority-medium { background: #fef3c7; color: #d97706; }
        .priority-low { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">历史会议管理</h1>
            <p class="text-gray-600">查看、搜索和管理所有会议记录</p>
        </header>

        <!-- 筛选和搜索 -->
        <section class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">日期范围</label>
                    <select id="date-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="all">全部时间</option>
                        <option value="week">最近一周</option>
                        <option value="month">最近一个月</option>
                        <option value="quarter">最近三个月</option>
                        <option value="year">最近一年</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">参与人数</label>
                    <select id="participant-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="all">全部</option>
                        <option value="1-3">1-3人</option>
                        <option value="4-10">4-10人</option>
                        <option value="10+">10人以上</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">会议类型</label>
                    <select id="type-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="all">全部类型</option>
                        <option value="project">项目会议</option>
                        <option value="weekly">周会</option>
                        <option value="review">评审会议</option>
                        <option value="brainstorm">头脑风暴</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">搜索</label>
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="搜索会议ID或内容..." 
                            class="w-full px-3 py-2 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-between items-center mt-4">
                <div class="flex items-center space-x-2">
                    <button id="export-selected" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm transition-colors flex items-center">
                        <i class="fas fa-download mr-2"></i>导出选中
                    </button>
                    <button id="clear-filters" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm transition-colors">
                        清除筛选
                    </button>
                </div>
                <div class="text-sm text-gray-600">
                    共 <span id="total-meetings">0</span> 个会议
                </div>
            </div>
        </section>

        <!-- 会议统计 -->
        <section class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4">会议统计</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-calendar-alt text-2xl text-blue-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">总会议数</p>
                    <p id="stat-total" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-users text-2xl text-green-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">总参与人数</p>
                    <p id="stat-participants" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-comments text-2xl text-purple-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">总内容数</p>
                    <p id="stat-contents" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-tasks text-2xl text-yellow-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">总行动项</p>
                    <p id="stat-actions" class="text-2xl font-bold text-gray-800">0</p>
                </div>
            </div>
        </section>

        <!-- 会议列表 -->
        <section class="bg-white rounded-2xl shadow-xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold text-gray-800">会议列表</h2>
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-600">排序:</span>
                    <select id="sort-order" class="px-3 py-1 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="newest">最新优先</option>
                        <option value="oldest">最早优先</option>
                        <option value="most-content">内容最多</option>
                        <option value="most-participants">参与最多</option>
                    </select>
                </div>
            </div>
            
            <div id="meetings-list" class="space-y-4">
                <!-- 会议卡片将在这里动态生成 -->
                <div class="text-center py-12">
                    <i class="fas fa-calendar-alt text-4xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">加载会议数据中...</p>
                </div>
            </div>
        </section>
    </div>

    <!-- 会议详情模态框 -->
    <div id="meeting-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200 sticky top-0 bg-white">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-bold text-gray-800" id="modal-meeting-id">会议详情</h3>
                    <button onclick="closeMeetingModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <div id="modal-content" class="p-6">
                <!-- 会议详情将在这里动态生成 -->
            </div>
        </div>
    </div>

    <script src="cloud-sync.js"></script>
    <script src="history-manager.js"></script>
</body>
</html>
