<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="optimized-styles.css">
    <style>
        .todo-card {
            transition: all 0.3s ease;
        }
        .todo-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .priority-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .priority-high { background: #fee2e2; color: #dc2626; }
        .priority-medium { background: #fef3c7; color: #d97706; }
        .priority-low { background: #d1fae5; color: #065f46; }
        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pending { background: #f3f4f6; color: #374151; }
        .status-in-progress { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-overdue { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">待办事项管理</h1>
            <p class="text-gray-600">跟踪、管理和完成所有会议行动项</p>
        </header>

        <!-- 筛选和搜索 -->
        <section class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                    <select id="status-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="all">全部状态</option>
                        <option value="pending">待处理</option>
                        <option value="in-progress">进行中</option>
                        <option value="completed">已完成</option>
                        <option value="overdue">已逾期</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">优先级</label>
                    <select id="priority-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="all">全部优先级</option>
                        <option value="high">高优先级</option>
                        <option value="medium">中优先级</option>
                        <option value="low">低优先级</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">负责人</label>
                    <select id="assignee-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="all">全部负责人</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">日期范围</label>
                    <select id="date-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="all">全部时间</option>
                        <option value="week">本周到期</option>
                        <option value="month">本月到期</option>
                        <option value="overdue">已逾期</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">搜索</label>
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="搜索待办事项..." 
                            class="w-full px-3 py-2 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-between items-center mt-4">
                <div class="flex items-center space-x-2">
                    <button id="batch-complete" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm transition-colors flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-check mr-2"></i>批量完成
                    </button>
                    <button id="batch-delete" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm transition-colors flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-trash mr-2"></i>批量删除
                    </button>
                    <button id="clear-filters" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm transition-colors">
                        清除筛选
                    </button>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-600">排序:</span>
                    <select id="sort-order" class="px-3 py-1 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="deadline">截止日期优先</option>
                        <option value="priority">优先级优先</option>
                        <option value="newest">最新创建</option>
                        <option value="oldest">最早创建</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- 待办事项统计 -->
        <section class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4">待办事项统计</h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
                <div class="text-center">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-tasks text-2xl text-gray-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">总待办数</p>
                    <p id="stat-total" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-clock text-2xl text-yellow-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">待处理</p>
                    <p id="stat-pending" class="text-2xl font-bold text-yellow-600">0</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-spinner text-2xl text-blue-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">进行中</p>
                    <p id="stat-in-progress" class="text-2xl font-bold text-blue-600">0</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-check-circle text-2xl text-green-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">已完成</p>
                    <p id="stat-completed" class="text-2xl font-bold text-green-600">0</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fas fa-exclamation-triangle text-2xl text-red-600"></i>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">已逾期</p>
                    <p id="stat-overdue" class="text-2xl font-bold text-red-600">0</p>
                </div>
            </div>
            
            <div class="mt-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">完成率统计</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <p class="text-sm text-gray-600 mb-1">整体完成率</p>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div id="completion-rate-overall" class="bg-green-600 h-3 rounded-full" style="width: 0%"></div>
                        </div>
                        <p class="text-sm text-gray-600 mt-1 text-right" id="completion-rate-overall-text">0%</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600 mb-1">高优先级完成率</p>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div id="completion-rate-high" class="bg-red-600 h-3 rounded-full" style="width: 0%"></div>
                        </div>
                        <p class="text-sm text-gray-600 mt-1 text-right" id="completion-rate-high-text">0%</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600 mb-1">逾期完成率</p>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div id="completion-rate-overdue" class="bg-amber-600 h-3 rounded-full" style="width: 0%"></div>
                        </div>
                        <p class="text-sm text-gray-600 mt-1 text-right" id="completion-rate-overdue-text">0%</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 待办事项列表 -->
        <section class="bg-white rounded-2xl shadow-xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold text-gray-800">待办事项列表</h2>
                <div class="text-sm text-gray-600">
                    共 <span id="total-todos">0</span> 个待办事项
                </div>
            </div>
            
            <div id="todos-list" class="space-y-4">
                <!-- 待办事项卡片将在这里动态生成 -->
                <div class="text-center py-12">
                    <i class="fas fa-list-alt text-4xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">加载待办事项中...</p>
                </div>
            </div>
        </section>
    </div>

    <!-- 待办事项详情模态框 -->
    <div id="todo-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200 sticky top-0 bg-white">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-bold text-gray-800" id="modal-todo-title">待办事项详情</h3>
                    <button onclick="closeTodoModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <div id="modal-content" class="p-6">
                <!-- 待办事项详情将在这里动态生成 -->
            </div>
        </div>
    </div>

    <script src="todo-manager.js"></script>
</body>
</html>
