<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>会议汇报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-h-screen;
        }
        .input-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .voice-btn.active {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.7);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(245, 87, 108, 0);
            }
        }
        .required::after {
            content: ' *';
            color: #ef4444;
        }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-md mx-auto">
        <!-- 头部 -->
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold text-white mb-1">会议汇报</h1>
            <p class="text-white text-opacity-80 text-sm">请填写您的汇报内容</p>
        </div>

        <!-- 输入卡片 -->
        <div class="input-card rounded-2xl shadow-2xl p-5 mb-4">
            <!-- 姓名（必填） -->
            <div class="mb-4">
                <label for="participant-name" class="block text-sm font-medium text-gray-700 mb-1 required">姓名</label>
                <input type="text" id="participant-name" placeholder="请输入您的姓名" 
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <!-- 上周关键结果（必填） -->
            <div class="mb-4">
                <label for="last-week" class="block text-sm font-medium text-gray-700 mb-1 required">
                    <i class="fas fa-check-circle text-green-500 mr-1"></i>上周关键结果
                </label>
                <textarea id="last-week" rows="3" placeholder="已完成的重要工作或成果..."
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
            </div>

            <!-- 本周重点事项（必填） -->
            <div class="mb-4">
                <label for="this-week" class="block text-sm font-medium text-gray-700 mb-1 required">
                    <i class="fas fa-star text-yellow-500 mr-1"></i>本周重点事项
                </label>
                <textarea id="this-week" rows="3" placeholder="本周计划完成的重要任务..."
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
            </div>

            <!-- 卡点 & 需要协调 -->
            <div class="mb-4">
                <label for="blockers" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-exclamation-triangle text-orange-500 mr-1"></i>卡点 & 需要协调
                </label>
                <textarea id="blockers" rows="3" placeholder="遇到的困难或需要帮助的问题..."
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
            </div>

            <!-- 风险 & 提醒 -->
            <div class="mb-4">
                <label for="risks" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-bell text-red-500 mr-1"></i>风险 & 提醒
                </label>
                <textarea id="risks" rows="3" placeholder="潜在风险或需要关注的事项..."
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
            </div>

            <!-- 其他 -->
            <div class="mb-4">
                <label for="others" class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-comment text-blue-500 mr-1"></i>其他
                </label>
                <textarea id="others" rows="3" placeholder="其他想要分享的内容..."
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
            </div>
        </div>

        <!-- 语音输入卡片 -->
        <div class="input-card rounded-2xl shadow-2xl p-5 mb-4">
            <div class="flex items-center justify-between mb-3">
                <label class="text-sm font-medium text-gray-700">
                    <i class="fas fa-microphone text-purple-500 mr-1"></i>语音输入
                </label>
                <button id="voice-record-btn" class="voice-btn w-12 h-12 rounded-full bg-purple-600 text-white flex items-center justify-center shadow-lg hover:bg-purple-700 transition-all">
                    <i class="fas fa-microphone text-xl"></i>
                </button>
            </div>
            <div id="voice-status" class="text-sm text-gray-500 text-center">点击麦克风开始语音输入</div>
            <div id="voice-progress" class="hidden mt-3">
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="voice-progress-bar" class="bg-purple-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 提交按钮 -->
        <button id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all flex items-center justify-center shadow-lg">
            <i class="fas fa-paper-plane mr-2"></i>提交汇报
        </button>
    </div>

    <!-- 成功提交弹窗 -->
    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-8 max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-2xl text-green-600"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">提交成功！</h3>
            <p class="text-gray-600 mb-6">您的汇报已成功提交，感谢参与</p>
            <button id="close-modal-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition-all">
                完成
            </button>
        </div>
    </div>

    <script src="input.js?v=2026040112"></script>
</body>
</html>
