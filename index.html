<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能会议助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="optimized-styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">智能会议助手</h1>
            <p class="text-gray-600">让会议更高效，让沟通更顺畅</p>
        </header>

        <!-- 主要内容 -->
        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 左侧：会议二维码区域 -->
            <section class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-2">本次会议二维码</h2>
                    <p class="text-gray-600">请使用手机扫码输入会议内容</p>
                </div>
                
                <div class="flex justify-center items-center p-4 bg-gray-50 rounded-xl">
                    <div id="qrcode" class="border-4 border-gray-200 rounded-lg p-2">
                        <!-- 二维码加载中状态 -->
                        <div class="flex flex-col items-center justify-center h-48">
                            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p class="text-sm text-gray-600">二维码加载中...</p>
                            <p class="text-xs text-gray-500 mt-2">如果长时间未显示，请检查网络连接</p>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-500 mb-2">会议编号: <span id="meeting-id" class="font-mono font-semibold">MEET-20260331</span></p>
                    <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition duration-300 flex items-center justify-center mx-auto">
                        <i class="fas fa-sync-alt mr-2"></i>刷新二维码
                    </button>
                </div>
                
                <!-- 备用访问方式 -->
                <div class="mt-6 bg-blue-50 rounded-lg p-4">
                    <h3 class="text-sm font-semibold text-blue-800 mb-2 flex items-center">
                        <i class="fas fa-link mr-2 text-blue-600"></i>备用访问方式
                    </h3>
                    <p class="text-xs text-blue-700 mb-2">如果二维码无法扫描，请手动访问以下链接：</p>
                    <div class="bg-white rounded p-2 break-all text-xs font-mono text-blue-900">
                        <span id="meeting-url">加载中...</span>
                    </div>
                    <p class="text-xs text-blue-700 mt-2">或在输入页面输入会议编号：<span class="font-mono font-semibold">${this.meetingId}</span></p>
                </div>
            </section>

            <!-- 右侧：会议控制区域 -->
            <section class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-2">会议控制中心</h2>
                    <p class="text-gray-600">管理会议流程和查看结果</p>
                </div>

                <div class="space-y-4">
                    <button id="start-meeting-btn" class="w-full bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition duration-300 flex items-center justify-center font-semibold">
                        <i class="fas fa-play-circle mr-2"></i>开始会议
                    </button>
                    
                    <button id="analyze-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg transition duration-300 flex items-center justify-center font-semibold">
                        <i class="fas fa-brain mr-2"></i>分析会议内容
                    </button>
                    
                    <a href="history.html" class="w-full bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-lg transition duration-300 flex items-center justify-center font-semibold">
                        <i class="fas fa-history mr-2"></i>历史会议管理
                    </a>
                    
                    <a href="todos.html" class="w-full bg-amber-600 hover:bg-amber-700 text-white px-6 py-3 rounded-lg transition duration-300 flex items-center justify-center font-semibold">
                        <i class="fas fa-tasks mr-2"></i>待办事项管理
                    </a>
                </div>

                <!-- 实时统计 -->
                <div class="mt-8 bg-gray-50 rounded-xl p-4">
                    <h3 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                        <i class="fas fa-chart-line mr-2 text-blue-500"></i>实时统计
                    </h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <p class="text-sm text-gray-600 mb-1">已提交人数</p>
                            <p id="participant-count" class="text-2xl font-bold text-blue-600">0</p>
                        </div>
                        <div class="text-center">
                            <p class="text-sm text-gray-600 mb-1">提交内容数</p>
                            <p id="content-count" class="text-2xl font-bold text-purple-600">0</p>
                        </div>
                    </div>
                    <button id="refresh-data-btn" class="mt-4 w-full bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition duration-300 flex items-center justify-center text-sm">
                        <i class="fas fa-sync-alt mr-2"></i>刷新数据
                    </button>
                </div>
            </section>
        </main>

        <!-- 会议结果展示区域 -->
        <section id="meeting-results" class="mt-8 bg-white rounded-2xl shadow-xl p-8 hidden">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-2">会议分析结果</h2>
                <p class="text-gray-600">基于大家的输入，智能分析得出的讨论重点</p>
            </div>
            
            <div id="analysis-result" class="prose max-w-none">
                <!-- 分析结果将在这里显示 -->
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="script.js"></script>
    <script src="ai-analyzer.js"></script>
    <script src="data-manager.js"></script>
</body>
</html>
